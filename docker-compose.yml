services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - results_data:/app/app_aplication/data/results

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://201.51.6.93:8000
        API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  results_data:
